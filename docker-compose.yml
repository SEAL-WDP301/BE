version: '3.8'

services:
  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: seal_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: seal_dev
      POSTGRES_USER: seal_user
      POSTGRES_PASSWORD: seal_password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
    networks:
      - seal_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U seal_user -d seal_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # pgAdmin (Optional - UI for PostgreSQL)
  # Uncomment to enable pgAdmin
  # ==========================================
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: seal_pgadmin
  #   restart: unless-stopped
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: admin@seal.local
  #     PGADMIN_DEFAULT_PASSWORD: admin123
  #     PGADMIN_CONFIG_SERVER_MODE: 'False'
  #   ports:
  #     - '5050:80'
  #   volumes:
  #     - pgadmin_data:/var/lib/pgadmin
  #   depends_on:
  #     - postgres
  #   networks:
  #     - seal_network

# ==========================================
# Volumes - Persist data between restarts
# ==========================================
volumes:
  postgres_data:
    driver: local
  # pgadmin_data:
  #   driver: local

# ==========================================
# Networks
# ==========================================
networks:
  seal_network:
    driver: bridge
