version: '3.8'

services:
  # ==========================================
  # PostgreSQL Database
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: seal_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: seal_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
    networks:
      - seal_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U root -d seal_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # pgAdmin (UI for PostgreSQL)
  # ==========================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: seal_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - seal_network

# ==========================================
# Volumes - Persist data between restarts
# ==========================================
volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local

# ==========================================
# Networks
# ==========================================
networks:
  seal_network:
    driver: bridge
